name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  deno:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - name: typecheck
        run: deno check mod.ts cli.ts
      - name: dogfood — repo-health gates its own structure
        run: |
          deno run -A cli.ts cycles    --include src --gate
          deno run -A cli.ts god-files --include src --maxLoc 400 --gate
