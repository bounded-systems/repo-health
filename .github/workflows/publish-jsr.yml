name: publish-jsr
on:
  # Tag-driven for normal releases; manual (workflow_dispatch) so a release can
  # publish without a git tag when tag creation is governance-restricted. JSR
  # versions by deno.json, not the tag — republishing an existing version is a
  # no-op-fail, so this is safe to run against main.
  push:
    tags: ["v[0-9]+.[0-9]+.[0-9]+"]
  workflow_dispatch: {}
permissions:
  contents: read
  id-token: write # OIDC → JSR provenance
jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: denoland/setup-deno@667a34cdef165d8d2b2e98dde39547c9daac7282 # v2.0.4
        with:
          deno-version: v2.x
      - run: npx jsr publish
